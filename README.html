<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Calgary Fire & EMS Panel</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f0f14;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    header {
        width: 100%;
        padding: 20px;
        text-align: center;
        background: #1c1f2a;
        font-size: 22px;
        font-weight: bold;
    }

    .container {
        margin-top: 30px;
        width: 90%;
        max-width: 800px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
    }

    button {
        padding: 18px;
        font-size: 16px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: #2a2f3d;
        color: white;
        transition: 0.2s;
    }

    button:hover {
        background: #3a4155;
    }

    .statusBox {
        grid-column: span 2;
        background: #1c1f2a;
        padding: 15px;
        border-radius: 10px;
        text-align: center;
    }

    .timer {
        font-size: 20px;
        margin-top: 10px;
        color: #00ff99;
    }

    .smallText {
        font-size: 13px;
        color: gray;
    }
</style>

</head>

<body>

<header>
    Calgary Fire & EMS Panel
</header>

<div class="container">

    <!-- STATUS PANEL -->
    <div class="statusBox">
        <div><b>Status:</b> OFF DUTY</div>
        <div class="timer">Shift Time: 00:00:00</div>
        <div class="timer">Break Time: 00:00:00</div>
        <div class="smallText">Frontend only — no backend connected yet</div>
    </div>

    <!-- BUTTONS -->
    <button>View Shifts</button>

    <button>Start Shift</button>

    <button>Start Break</button>

    <button>Call Panic</button>

    <button>Create Incident Report</button>

</div>

</body>
</html>
